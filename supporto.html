<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supporto – Doddly</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(circle at 10% 0%, #CAF0F8 0%, transparent 55%),
      radial-gradient(circle at 100% 15%, #90E0EF 0%, transparent 45%),
      #E9F8FB;
    color: #023047;
    line-height: 1.65;
  }

  header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background-color: #ffffff;
    border-bottom: 1px solid #CAF0F8;
    text-align: center;
    padding: 20px 16px 16px;
    z-index: 1000;
    box-shadow: 0 2px 10px rgba(2,48,71,0.06);
  }

  .brand { font-size: 1.4em; font-weight: 800; color: #023047; }

  .legal-links {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 8px;
    font-size: 0.85em;
    font-weight: 600;
  }
  .legal-links a { color: #0077B6; text-decoration: none; }
  .legal-links a:hover { text-decoration: underline; }
  .legal-links .current { color: #023047; opacity: 0.55; }

  .content-wrapper {
    max-width: 760px;
    margin: 150px auto 60px auto;
    background-color: #ffffff;
    padding: 44px 48px;
    border-radius: 18px;
    box-shadow: 0 8px 30px rgba(2,48,71,0.10);
    text-align: center;
  }

  h2 {
    margin-top: 8px;
    margin-bottom: 14px;
    font-size: 1.3em;
    color: #023047;
  }

  p { font-size: 1.05em; margin-bottom: 16px; color: #333; }

  .email-button {
    display: inline-block;
    background: #0077B6;
    color: #ffffff !important;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 999px;
    text-decoration: none;
    margin-top: 12px;
  }
  .email-button:hover { background: #00B4D8; }

  footer {
    text-align: center;
    margin: 40px 0 30px 0;
    font-size: 0.9em;
    color: #5f6f77;
  }

  @media (max-width: 600px) {
    .content-wrapper { padding: 32px 24px; margin-top: 175px; }
    .brand { font-size: 1.2em; }
  }
</style>
</head>
<body>
  <header>
    <div class="brand">Supporto Doddly</div>
    <div class="legal-links">
      <a href="https://qmkqgns7pm-wq.github.io/doddly/privacy-policy.html">Privacy Policy</a>
      <a href="https://qmkqgns7pm-wq.github.io/doddly/termini.html">Termini e Condizioni</a>
      <span class="current">Supporto</span>
    </div>
  </header>

  <div class="content-wrapper">
    <h2>Come possiamo aiutarti?</h2>
    <p>Per assistenza sull'app Doddly, puoi contattarci via email. Risponderemo il prima possibile a tutte le richieste di supporto.</p>
    <a class="email-button" href="mailto:domenicsteam@gmail.com">📩 domenicsteam@gmail.com</a>
  </div>

  <footer>&copy; 2026 Doddly. Tutti i diritti riservati.</footer>
</body>
</html>
